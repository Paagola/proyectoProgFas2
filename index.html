<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle of Elements — Wave Defense</title>
    <meta name="description" content="Juego de defensa por oleadas con heroes y monstruos. Defiende tu territorio contra oleadas de criaturas fantasticas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">

        <!-- ── Sidebar ──────────────────────────────────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>CORE<br><span class="title-sub">TACTICAL ENGINE</span></h1>
            </div>

            <!-- Level & Wave display -->
            <div class="level-badge-group">
                <div class="level-badge">
                    <span class="badge-label">NIVEL</span>
                    <span class="badge-value" id="stat-level">1</span>
                </div>
                <div class="level-badge enemy-badge">
                    <span class="badge-label">OLEADA</span>
                    <span class="badge-value" id="stat-wave">0</span>
                </div>
                <div class="level-badge gold-badge">
                    <span class="badge-label">ORO</span>
                    <span class="badge-value" id="stat-gold">150</span>
                </div>
            </div>


            <!-- Actions -->
            <div class="actions">
                <div class="hotbar">
                    <button class="tool-btn active" data-tool="hero" title="Colocar Héroe (70 Oro)">🛡️ HÉROE (70)</button>
                    <button class="tool-btn" data-tool="rock" title="Poner Muro (25 Oro)">🧱 MURO (25)</button>
                    <button class="tool-btn" data-tool="spell" title="Lanzar Rayo (120 Oro)">⚡ RAYO (120)</button>
                </div>
                <button id="btn-start"  class="btn-primary">⚔ NUEVA PARTIDA</button>
                <button id="btn-pause"  class="btn-secondary">▐▐ PAUSAR</button>
            </div>

            <!-- Live stats -->
            <div class="live-stats">
                <h3 class="group-title">📊 En Vivo</h3>
                <div class="stat-row hero-row">
                    <span class="stat-icon">🛡</span>
                    <span class="stat-name">Héroes</span>
                    <strong class="stat-num hero-num" id="stat-buenos">0</strong>
                </div>
                <div class="stat-row enemy-row">
                    <span class="stat-icon">☠</span>
                    <span class="stat-name">Enemigos</span>
                    <strong class="stat-num enemy-num" id="stat-malos">0</strong>
                </div>
            </div>

            <!-- Legend -->
            <div class="legend">
                <h3 class="group-title">👾 Enemigos</h3>
                <div class="legend-row"><span class="leg-dot eye-dot"></span><span>Ojo Volador</span></div>
                <div class="legend-row"><span class="leg-dot skel-dot"></span><span>Esqueleto</span></div>
                <div class="legend-row"><span class="leg-dot gob-dot"></span><span>Goblin</span></div>
                <div class="legend-row"><span class="leg-dot mush-dot"></span><span>Hongo</span></div>
            </div>

            <!-- Tactical Log -->
            <div class="system-log" id="system-log">
                <h3 class="group-title">📋 Tactical Log</h3>
                <div class="log-entries" id="log-entries">
                    <div class="log-entry system">SYSTEM READY...</div>
                </div>
            </div>

            <div class="sidebar-footer">
                <p>⛰ Las piedras bloquean<br>a todos los combatientes</p>
            </div>
        </aside>

        <!-- ── Canvas ────────────────────────────────────────────────────── -->
        <main class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="simulationCanvas"></canvas>
        </main>
    </div>

    <!-- ── Game Over Modal ──────────────────────────────────────────────── -->
    <div id="modal-gameover" class="modal hidden">
        <div class="modal-content">
            <h2 id="winner-text">OPERATION STATUS</h2>
            <p id="winner-sub"></p>
            <div class="modal-stats-grid">
                <div class="modal-stat">
                    <span class="m-stat-label">Neutralizaciones</span>
                    <span class="m-stat-value" id="m-stat-kills">0</span>
                </div>
                <div class="modal-stat">
                    <span class="m-stat-label">Capital Invertido</span>
                    <span class="m-stat-value" id="m-stat-gold">0</span>
                </div>
                <div class="modal-stat">
                    <span class="m-stat-label">Nivel de Amenaza</span>
                    <span class="m-stat-value" id="m-stat-threat">1.0</span>
                </div>
            </div>
            <button id="btn-modal-restart" class="btn-primary">REINITIALIZE SYSTEM</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
